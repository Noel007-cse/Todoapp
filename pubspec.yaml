name: todo_app
description: A beautiful and functional To-Do list app with productivity tracking.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.0

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date/Time Formatting
  intl: ^0.19.0

  # Charts & Analytics
  fl_chart: ^0.65.0

  # Notifications (kept for permission request only)
  flutter_local_notifications: ^17.2.4
  timezone: ^0.9.0

  # 🔔 Android system intents — opens Clock & Calendar apps
  android_intent_plus: ^4.0.2

  # 🌐 Open URLs (Google Calendar web fallback)
  url_launcher: ^6.2.5

  # UI/Animation
  lottie: ^2.4.0

  # Other utilities
  uuid: ^4.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  adaptive_icon_background: "#EDF6F9"
  adaptive_icon_foreground: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png